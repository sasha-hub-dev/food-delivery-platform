databaseChangeLog:
  - changeSet:
      id: 001-create-orders-table
      author: your-name
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: order_date
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: restaurant_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: total_price
                  type: integer
                  constraints:
                    nullable: false

  - changeSet:
      id: 002-create-order-items-table
      author: your-name
      changes:
        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: dish_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: dish_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: order_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_item_order
                    references: orders(id)

  - changeSet:
      id: 003-create-payments-table
      author: your-name
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: method
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: order_id
                  type: bigint
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_payment_order
                    references: orders(id)