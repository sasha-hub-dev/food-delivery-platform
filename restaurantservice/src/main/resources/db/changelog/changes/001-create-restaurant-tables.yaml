databaseChangeLog:
  - changeSet:
      id: 001-create-restaurants-table
      author: your-name
      changes:
        - createTable:
            tableName: restaurants
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: cuisine
                  type: varchar(255)
              - column:
                  name: address
                  type: text

  - changeSet:
      id: 002-create-dishes-table
      author: your-name
      changes:
        - createTable:
            tableName: dishes
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: price
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: image_url
                  type: varchar(500)
              - column:
                  name: restaurant_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_dish_restaurant
                    references: restaurants(id)