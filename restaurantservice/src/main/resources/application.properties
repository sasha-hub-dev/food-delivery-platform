spring.application.name=restaurant-service
server.port=8082

spring.datasource.url=jdbc:postgresql://192.168.99.100:5433/restaurantdb
spring.datasource.username=postgres
spring.datasource.password=password

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.fooddelivery.restaurantservice=DEBUG

# JWT Settings
jwt.secret=mySuperSecretKeyForFoodDeliveryPlatform2024ThatIsVeryLongAndSecure
jwt.expiration=86400000